<!DOCTYPE html>
<html>
<head>
    <title>Mini RAG 🕷️</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 80px;
        }
        button {
            padding: 10px;
            margin-top: 10px;
        }
        .box {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<h2>🕷️ Mini RAG Chat</h2>

<textarea id="query" placeholder="Ask something..."></textarea>
<br>
<button onclick="ask()">Ask</button>

<div class="box">
    <h3>Answer:</h3>
    <p id="answer"></p>
</div>

<div class="box">
    <h3>Retrieved Chunks:</h3>
    <ul id="chunks"></ul>
</div>

<script>
async function ask() {
    const query = document.getElementById("query").value;

    const res = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
    });

    const data = await res.json();

    document.getElementById("answer").innerText = data.answer;

    const chunksList = document.getElementById("chunks");
    chunksList.innerHTML = "";

    data.chunks.forEach(chunk => {
        const li = document.createElement("li");
        li.innerText = chunk;
        chunksList.appendChild(li);
    });
}
</script>

</body>
</html>
